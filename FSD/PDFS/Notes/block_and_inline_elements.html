<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block Elements</title>
</head>
<body>
    <!-- 
    Block elements are level elements that create a new line of content, stacking on top of each other by default
    elements such as :-
    paragraph <p>
    headings <h1...to...h6>
    lists and list items
    header footer
    main section
    -->
    <h1>h1</h1>
    <h2>h2</h2>
    <h3>h3</h3>
    <h4>h4</h4>
    <h5>h5</h5>
    <h6>h6</h6>
    <section>section</section>
    <main>main</main>
    <div>div</div>
    <!-- 
    inline elements
    only occupy the space that is required by them and follow the flow of the document
    inline elements such as :-
    links
    strong
    em
    span
    images(sort of)
    -->
    <!-- anchor tags are used as an example to demonstrate inline elements -->
    <!-- you can inspect the web page and click or hover the anchor tag and check how much space its using -->
    <!-- you will find out that it uses only the space that is necessary. -->
    <a href="https://www.youtube.com">youtube</a><br>
    <a href="https://www.google.com">google</a><br>
</body>
</html>
