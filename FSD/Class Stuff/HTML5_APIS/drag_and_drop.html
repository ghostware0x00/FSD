<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Drag & Drop Task Board</title>
  <style>
    body {
      font-family: Arial;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 40px;
    }
    .column {
      width: 250px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 0 5px rgba(0,0,0,0.2);
      padding: 10px;
    }
    h3 {
      text-align: center;
      background: #007bff;
      color: white;
      padding: 5px;
      border-radius: 8px;
    }
    .task {
      background: #e9ecef;
      margin: 8px;
      padding: 10px;
      border-radius: 8px;
      cursor: grab;
    }
    .column.drag-over {
      background: #e0f7fa;
    }
  </style>
</head>
<body>
  <div class="column" id="todo">
    <h3>To Do</h3>
    <div class="task" draggable="true">Create UI Design</div>
    <div class="task" draggable="true">Set up API</div>
  </div>

  <div class="column" id="inProgress">
    <h3>In Progress</h3>
    <div class="task" draggable="true">Develop Frontend</div>
  </div>

  <div class="column" id="done">
    <h3>Done</h3>
    <div class="task" draggable="true">Database Setup</div>
  </div>

  <script>
    const tasks = document.querySelectorAll(".task");
    const columns = document.querySelectorAll(".column");

    tasks.forEach(task => {
      task.addEventListener("dragstart", e => {
        e.dataTransfer.setData("text/plain", e.target.textContent);
        e.target.classList.add("dragging");
      });

      task.addEventListener("dragend", e => {
        e.target.classList.remove("dragging");
      });
    });

    columns.forEach(col => {
      col.addEventListener("dragover", e => {
        e.preventDefault();
        col.classList.add("drag-over");
      });

      col.addEventListener("dragleave", () => {
        col.classList.remove("drag-over");
      });

      col.addEventListener("drop", e => {
        e.preventDefault();
        const draggedTask = document.querySelector(".dragging");
        col.appendChild(draggedTask);
        col.classList.remove("drag-over");
      });
    });
  </script>
</body>
</html>
