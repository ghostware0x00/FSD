<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Real-Time Notifications Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex flex-col items-center justify-center min-h-screen bg-gray-100 text-center">

  <h1 class="text-2xl font-bold mb-3">🔔 Real-Time Web Notifications</h1>
  <p class="text-gray-600 mb-4">Click the button below to enable notifications.</p>

  <button id="startBtn"
          class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700">
    Start Real-Time Notifications
  </button>

  <p id="status" class="mt-4 text-gray-500"></p>

  <script>
    const startBtn = document.getElementById("startBtn");
    const status = document.getElementById("status");

    let counter = 1;
    let intervalId;

    // Request permission when user clicks start
    startBtn.addEventListener("click", () => {
      if (Notification.permission === "granted") {
        startNotifications();
      } else if (Notification.permission !== "denied") {
        Notification.requestPermission().then(permission => {
          if (permission === "granted") {
            startNotifications();
          } else {
            alert("Please allow notifications to see real-time alerts.");
          }
        });
      }
    });

    function startNotifications() {
      status.textContent = "✅ Notifications started! You’ll receive one every 10 seconds.";

      // Send one notification immediately
      showNotification();

      // Then repeat every 10 seconds
      intervalId = setInterval(showNotification, 10000);
    }

    function showNotification() {
      const notification = new Notification("📢 Live Update #" + counter, {
        body: `This is your real-time alert number ${counter}!`,
        icon: "https://cdn-icons-png.flaticon.com/512/1827/1827345.png"
      });

      counter++;

      notification.onclick = () => {
        window.focus();
        alert("You clicked the notification!");
      };
    }
  </script>

</body>
</html>
