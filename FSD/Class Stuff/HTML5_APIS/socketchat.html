<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple WebSocket Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex flex-col items-center justify-center min-h-screen bg-gray-100 text-center">

  <h1 class="text-2xl font-bold mb-4">💬 Simple WebSocket Chat</h1>

  <div class="bg-white shadow-md rounded-lg p-6 w-80">
    <input id="msg" type="text" placeholder="Type a message..."
           class="border p-2 w-full mb-3 rounded">
    <button id="sendBtn"
            class="bg-indigo-600 text-white px-4 py-2 rounded w-full hover:bg-indigo-700">
      Send Message
    </button>

    <p id="status" class="text-sm mt-4 text-gray-500"></p>
    <div id="output" class="mt-3 text-left text-gray-700"></div>
  </div>

  <script>
    // ✅ Connect to public WebSocket echo server
    const socket = new WebSocket("wss://ws.postman-echo.com/raw");


    const status = document.getElementById("status");
    const output = document.getElementById("output");
    const msg = document.getElementById("msg");
    const sendBtn = document.getElementById("sendBtn");

    socket.onopen = () => {
      status.textContent = "✅ Connected to WebSocket Server";
    };

    socket.onmessage = (event) => {
      output.innerHTML += `<p>🟢 Server: ${event.data}</p>`;
    };

    socket.onclose = () => {
      status.textContent = "❌ Disconnected from Server";
    };

    sendBtn.onclick = () => {
      const message = msg.value.trim();
      if (message) {
        socket.send(message);
        output.innerHTML += `<p>🔵 You: ${message}</p>`;
        msg.value = "";
      }
    };
  </script>

</body>
</html>
