<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Theme Switcher using Web Storage</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body id="body" class="transition-colors duration-500 min-h-screen flex flex-col items-center justify-center">

  <div class="text-center p-6 rounded-2xl shadow-lg w-80">
    <h1 class="text-2xl font-bold mb-4">🌗 Theme Switcher</h1>
    <p class="mb-6 text-gray-600">Choose your preferred theme below. Your choice will be saved!</p>

    <button id="themeBtn"
      class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 transition">
      Switch Theme
    </button>

    <p id="themeStatus" class="mt-4 text-sm text-gray-700 font-medium"></p>
  </div>

  <script>
    const body = document.getElementById("body");
    const themeBtn = document.getElementById("themeBtn");
    const themeStatus = document.getElementById("themeStatus");

    // 🌞 Function to apply theme
    function applyTheme(theme) {
      if (theme === "dark") {
        body.classList.add("bg-gray-900", "text-white");
        body.classList.remove("bg-white", "text-gray-800");
        themeStatus.textContent = "Current Theme: Dark Mode";
      } else {
        body.classList.add("bg-white", "text-gray-800");
        body.classList.remove("bg-gray-900", "text-white");
        themeStatus.textContent = "Current Theme: Light Mode";
      }
    }

    // 🌙 Load saved theme on page load
    window.addEventListener("load", () => {
      const savedTheme = localStorage.getItem("theme") || "light";
      applyTheme(savedTheme);
    });

    // 🌓 Toggle theme and store in localStorage
    themeBtn.addEventListener("click", () => {
      const currentTheme = localStorage.getItem("theme") === "dark" ? "light" : "dark";
      localStorage.setItem("theme", currentTheme);
      applyTheme(currentTheme);
    });
  </script>
</body>
</html>
