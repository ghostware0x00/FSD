<!doctype html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body>
        <main>
            <!-- 
            SECTION 1
            Background Colour: Light blue
            Text Colour: Dark Purple
            Margin: 4 units all sides (1rem)
            Padding: 6 units on all sides (1.5rem)
            Width: Half of the parent container
            Height: 32 units (8rem)
             -->

            
            
            <!-- 0.25 rem = 1 p(tailwind unit)
            so p = 4 units = 1 rem 
            -->

            <!-- margin = m
            padding = p
            m-4 = margin on all sides of 4 units
            p-6 = padding on all sides of 6 units 
            easiest way to calculate from rem to p units is rem * 4 = p units value 
            -->
            <section class="
            bg-blue-300
            text-purple-600
            m-4 p-6
            w-1/2 h-32
            ">
                <p>Section 1</p>
            </section>
            
            <!-- 
            SECTION 2
            Background Colour: Dark green.
            Text Colour: Pale green
            Margin: 6 units on the top and bottom only (1.5rem)
            Padding: 8 units on the left and right only (2rem) 
            Width: 100% of the parent width
            Height: 40 units (10rem)
             -->

            <!-- margin top and bottom means the y axis so my -->
            <!-- and again 1.5 rem * 4 = 6 tailwind units  -->
            <section class="
            bg-green-950
            text-green-100
            my-6 px-8
            w-full 
            h-40
            ">
                <p>Section 2</p>
            </section>
            
            <!-- 
            SECTION 3
            Background Colour: Light Yellow
            Text Colour: Dark Amber
            Margin: Automatically centered horizontally (mx-auto)
            Padding: 4 units to the top only (1rem)
            Width: 5/12 of the parent container
            Height: 24 units (6rem)
            -->

            <!-- 
            margin applying horizontally means mx
            and trying to automatically center the margin horizontally means
            mx auto

            pt = padding top 
            --> 
            <section class="
            bg-yellow-200
            text-amber-950
            mx-auto
            pt-4
            w-5/12
            h-24
            ">
                <p>Section 3</p>
            </section>
        </main>
    </body>
</html>
